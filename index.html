<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>CinePlay 8 Ball PRO | Joabe Play</title>
    <style>
        :root { --neon: #00ff88; --wood: #3e2a1c; --felt: #07633a; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; }
        
        #app { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; width: 100vw; }

        /* Interface Superior */
        #hud {
            width: 95%; max-width: 1100px; background: rgba(15,15,15,0.9);
            padding: 10px 20px; border-radius: 15px; border-bottom: 3px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .player { padding: 8px 15px; border-radius: 10px; border: 2px solid transparent; text-align: center; color: white; width: 40%; }
        .active { border-color: var(--neon); background: rgba(0,255,136,0.1); }
        .ball-group { font-size: 0.8em; color: var(--neon); font-weight: bold; margin-top: 5px; }

        /* Moldura da Mesa */
        #table-frame {
            padding: 15px; background: var(--wood); border-radius: 20px;
            box-shadow: inset 0 0 40px #000, 0 15px 50px rgba(0,0,0,0.8);
            position: relative;
        }
        canvas { background: var(--felt); border-radius: 5px; display: block; cursor: crosshair; }

        /* Barra de Força Lateral */
        #power-ui {
            position: absolute; right: -35px; top: 50%; transform: translateY(-50%);
            height: 250px; width: 15px; background: #111; border: 2px solid #444; border-radius: 10px; overflow: hidden;
        }
        #power-bar { position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(to top, #00ff88, #ff3300); }

        #msg { position: absolute; bottom: 15px; color: white; background: rgba(0,0,0,0.6); padding: 5px 20px; border-radius: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div id="app">
    <div id="hud">
        <div id="p1-ui" class="player active">
            <div style="font-weight:bold">👤 JOABE PLAY</div>
            <div id="p1-type" class="ball-group">DEFININDO...</div>
        </div>
        <div style="color: #444; font-weight: 900;">VS</div>
        <div id="p2-ui" class="player">
            <div style="font-weight:bold">🤖 BOT PRO</div>
            <div id="p2-type" class="ball-group"></div>
        </div>
    </div>

    <div id="table-frame">
        <div id="power-ui"><div id="power-bar"></div></div>
        <canvas id="poolCanvas"></canvas>
    </div>

    <div id="msg">Sua vez! Acerte as caçapas.</div>
</div>

<script>
    const canvas = document.getElementById('poolCanvas');
    const ctx = canvas.getContext('2d');
    const powerBar = document.getElementById('power-bar');
    const msg = document.getElementById('msg');

    // CONFIGURAÇÕES GLOBAIS
    let ballRadius, whiteBall, balls = [], pockets = [];
    const FRICTION = 0.985;
    const WALL_BOUNCE = 0.7;
    let turn = 1; // 1: Joabe, 2: Bot
    let p1Type = null; // 'solid' ou 'stripe'
    let isMoving = false, isCharging = false, power = 0, mouseX, mouseY;

    class Ball {
        constructor(x, y, radius, color, num, type) {
            this.x = x; this.y = y; this.radius = radius;
            this.color = color; this.num = num; this.type = type;
            this.vx = 0; this.vy = 0; this.inPocket = false;
        }

        draw() {
            if (this.inPocket) return;
            
            // Sombra
            ctx.beginPath();
            ctx.arc(this.x + 3, this.y + 3, this.radius, 0, Math.PI*2);
            ctx.fillStyle = "rgba(0,0,0,0.3)";
            ctx.fill();

            // Bola
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.color;
            ctx.fill();

            // Detalhe de Listra
            if (this.type === 'stripe') {
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.5, 0, 0, Math.PI * 2);
                ctx.fillStyle = "white";
                ctx.fill();
            }

            // Círculo do Número
            if (this.type !== 'white') {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI*2);
                ctx.fillStyle = "white";
                ctx.fill();
                ctx.fillStyle = "black";
                ctx.font = `bold ${this.radius * 0.8}px Arial`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(this.num, this.x, this.y);
            }

            // Brilho 3D
            let grad = ctx.createRadialGradient(this.x-4, this.y-4, 1, this.x, this.y, this.radius);
            grad.addColorStop(0, "rgba(255,255,255,0.4)");
            grad.addColorStop(1, "rgba(0,0,0,0.1)");
            ctx.fillStyle = grad; ctx.fill();
        }

        update() {
            if (this.inPocket) return;
            this.x += this.vx; this.y += this.vy;
            this.vx *= FRICTION; this.vy *= FRICTION;

            if (Math.abs(this.vx) < 0.1) this.vx = 0;
            if (Math.abs(this.vy) < 0.1) this.vy = 0;

            // Borda da mesa
            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                this.vx *= -WALL_BOUNCE;
                this.x = this.x < this.radius ? this.radius : canvas.width - this.radius;
            }
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                this.vy *= -WALL_BOUNCE;
                this.y = this.y < this.radius ? this.radius : canvas.height - this.radius;
            }
            this.checkPocket();
        }

        checkPocket() {
            pockets.forEach(p => {
                const dist = Math.hypot(this.x - p.x, this.y - p.y);
                // Se cair no buraco (o buraco é 2.5x maior que a bola)
                if (dist < ballRadius * 1.8) {
                    this.inPocket = true;
                    this.vx = 0; this.vy = 0;
                    handleRules(this);
                }
            });
        }
    }

    function init() {
        // Mesa GIGANTE: 90% da largura da tela, proporção 2:1
        const w = window.innerWidth * 0.9;
        canvas.width = w;
        canvas.height = w / 2;
        
        // Bolas e Caçapas GIGANTES
        ballRadius = canvas.width * 0.022; 
        
        // Posição das Caçapas (Buracos)
        pockets = [
            {x: 0, y: 0}, {x: canvas.width/2, y: 0}, {x: canvas.width, y: 0},
            {x: 0, y: canvas.height}, {x: canvas.width/2, y: canvas.height}, {x: canvas.width, y: canvas.height}
        ];

        setupBalls();
        requestAnimationFrame(loop);
    }

    function setupBalls() {
        balls = [];
        whiteBall = new Ball(canvas.width * 0.25, canvas.height/2, ballRadius, "white", 0, "white");
        balls.push(whiteBall);

        const colors = ["#f1c40f", "#2980b9", "#e74c3c", "#8e44ad", "#d35400", "#27ae60", "#c0392b", "#333"];
        let count = 1;
        const startX = canvas.width * 0.7, startY = canvas.height/2;

        // Triângulo Oficial
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j <= i; j++) {
                let type = count === 8 ? "black" : (count <= 7 ? "solid" : "stripe");
                let color = count === 8 ? "black" : colors[(count-1) % 7];
                balls.push(new Ball(startX + (i*ballRadius*1.8), startY + (j*ballRadius*2.1) - (i*ballRadius), ballRadius, color, count, type));
                count++;
            }
        }
    }

    function handleRules(ball) {
        if (ball.type === "white") {
            msg.innerText = "FALTA! Branca caiu.";
            setTimeout(() => { ball.inPocket = false; ball.x = canvas.width*0.25; ball.y = canvas.height/2; }, 1000);
        } else if (ball.type === "black") {
            // Regra da Bola 8
            const rem = balls.filter(b => !b.inPocket && b.type !== 'white' && b.type !== 'black').length;
            if (rem > 0) {
                alert("DERROTA! Encaçapou a 8 antes da hora.");
            } else {
                alert(turn === 1 ? "JOABE PLAY VENCEU! 🏆" : "BOT VENCEU!");
            }
            location.reload();
        } else if (!p1Type) {
            // Define grupo após a primeira bola
            p1Type = (turn === 1) ? ball.type : (ball.type === 'solid' ? 'stripe' : 'solid');
            document.getElementById('p1-type').innerText = p1Type === 'solid' ? "LISAS" : "LISTRADAS";
            document.getElementById('p2-type').innerText = p1Type === 'solid' ? "LISTRADAS" : "LISAS";
        }
    }

    function loop() {
        ctx.fillStyle = "#07633a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Desenhar Caçapas (Buracos Gigantes)
        ctx.fillStyle = "#111";
        pockets.forEach(p => {
            ctx.beginPath(); ctx.arc(p.x, p.y, ballRadius * 2.2, 0, Math.PI*2); ctx.fill();
        });

        // Colisões entre bolas
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                let b1 = balls[i], b2 = balls[j];
                if (b1.inPocket || b2.inPocket) continue;
                let dx = b2.x - b1.x, dy = b2.y - b1.y;
                let dist = Math.hypot(dx, dy);
                if (dist < b1.radius + b2.radius) {
                    let angle = Math.atan2(dy, dx);
                    let vx1 = b1.vx * Math.cos(angle) + b1.vy * Math.sin(angle);
                    let vy1 = b1.vy * Math.cos(angle) - b1.vx * Math.sin(angle);
                    let vx2 = b2.vx * Math.cos(angle) + b2.vy * Math.sin(angle);
                    let vy2 = b2.vy * Math.cos(angle) - b2.vx * Math.sin(angle);
                    b1.vx = vx2 * Math.cos(angle) - vy1 * Math.sin(angle);
                    b1.vy = vy1 * Math.cos(angle) + vx2 * Math.sin(angle);
                    b2.vx = vx1 * Math.cos(angle) - vy2 * Math.sin(angle);
                    b2.vy = vy2 * Math.cos(angle) + vx1 * Math.sin(angle);
                    let overlap = b1.radius + b2.radius - dist;
                    b1.x -= overlap * Math.cos(angle) * 0.5; b1.y -= overlap * Math.sin(angle) * 0.5;
                    b2.x += overlap * Math.cos(angle) * 0.5; b2.y += overlap * Math.sin(angle) * 0.5;
                }
            }
        }

        let moving = false;
        balls.forEach(b => {
            b.update(); b.draw();
            if (b.vx !== 0 || b.vy !== 0) moving = true;
        });

        if (!moving && isMoving) {
            isMoving = false; turn = turn === 1 ? 2 : 1;
            updateUI();
            if (turn === 2) setTimeout(botDecision, 1000);
        }

        if (!moving && turn === 1) drawCue();
        requestAnimationFrame(loop);
    }

    function drawCue() {
        const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
        
        // Mira
        ctx.beginPath(); ctx.setLineDash([5, 5]);
        ctx.moveTo(whiteBall.x, whiteBall.y);
        ctx.lineTo(whiteBall.x + Math.cos(angle) * 600, whiteBall.y + Math.sin(angle) * 600);
        ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke(); ctx.setLineDash([]);

        // Taco
        const offset = whiteBall.radius + 10 + (power * 0.7);
        ctx.save();
        ctx.translate(whiteBall.x, whiteBall.y); ctx.rotate(angle + Math.PI);
        let grad = ctx.createLinearGradient(offset, 0, offset+400, 0);
        grad.addColorStop(0, "#f1c40f"); grad.addColorStop(1, "#3e2a1c");
        ctx.fillStyle = grad; ctx.fillRect(offset, -5, 400, 10);
        ctx.restore();
    }

    function updateUI() {
        document.getElementById('p1-ui').className = turn === 1 ? "player active" : "player";
        document.getElementById('p2-ui').className = turn === 2 ? "player active" : "player";
        msg.innerText = turn === 1 ? "Sua vez, Joabe!" : "Bot PRO pensando...";
    }

    function botDecision() {
        const targets = balls.filter(b => !b.inPocket && b.type !== 'white');
        const target = targets[Math.floor(Math.random() * targets.length)];
        const angle = Math.atan2(target.y - whiteBall.y, target.x - whiteBall.x);
        whiteBall.vx = Math.cos(angle) * 15;
        whiteBall.vy = Math.sin(angle) * 15;
        isMoving = true;
    }

    // EVENTOS
    window.addEventListener('mousemove', e => {
        const r = canvas.getBoundingClientRect();
        mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
    });
    window.addEventListener('mousedown', () => { if(!isMoving && turn === 1) isCharging = true; });
    window.addEventListener('mouseup', () => {
        if (isCharging) {
            const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
            whiteBall.vx = Math.cos(angle) * (power/5);
            whiteBall.vy = Math.sin(angle) * (power/5);
            isCharging = false; power = 0; powerBar.style.height = "0%"; isMoving = true;
        }
    });

    setInterval(() => { if(isCharging) { power = Math.min(power+2, 100); powerBar.style.height = power+"%"; } }, 20);

    init();
</script>
</body>
</html>
