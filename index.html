<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePlay 8 Ball Pool | Joabe Play</title>
    <style>
        :root { --neon: #00ff88; }
        body, html { margin: 0; padding: 0; overflow: hidden; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; color: white; }
        
        #game-wrapper { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }

        /* Painel de Status */
        #status-bar {
            width: 85%; background: rgba(20,20,20,0.9); padding: 15px;
            border-radius: 12px; border: 1px solid #333; margin-bottom: 10px;
            display: flex; justify-content: space-around; align-items: center;
        }
        .active-turn { border: 2px solid var(--neon); box-shadow: 0 0 10px var(--neon); }
        .player-info { padding: 10px 20px; border-radius: 8px; transition: 0.3s; text-align: center; }

        canvas { border: 15px solid #2c1e14; border-radius: 8px; background: #07633a; cursor: crosshair; }

        #power-meter {
            position: absolute; right: 20px; height: 300px; width: 20px;
            background: #222; border: 2px solid #444; border-radius: 10px; overflow: hidden;
        }
        #power-fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(to top, var(--neon), #ff3300); }

        #log { position: absolute; bottom: 20px; left: 20px; color: var(--neon); font-size: 14px; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="status-bar">
        <div id="p1-box" class="player-info active-turn">
            <div>👤 JOABE PLAY</div>
            <div id="p1-type" style="font-size: 12px; opacity: 0.7;">Bolas: ?</div>
        </div>
        <div style="font-size: 24px; font-weight: bold; color: var(--neon);">VS</div>
        <div id="p2-box" class="player-info">
            <div>🤖 BOT (MÉDIO)</div>
            <div id="p2-type" style="font-size: 12px; opacity: 0.7;">Bolas: ?</div>
        </div>
    </div>

    <div id="power-meter"><div id="power-fill"></div></div>
    <canvas id="poolCanvas"></canvas>
    <div id="log">Aguardando início...</div>
</div>

<script>
    const canvas = document.getElementById('poolCanvas');
    const ctx = canvas.getContext('2d');
    const powerFill = document.getElementById('power-fill');
    const log = document.getElementById('log');

    // --- CONFIGURAÇÕES ---
    const FRICTION = 0.985;
    const BALL_RADIUS_RATIO = 0.018; 
    let ballRadius, whiteBall, balls = [];
    let isCharging = false, power = 0, mouseX, mouseY;
    let turn = 1; // 1 = Jogador, 2 = Bot
    let gameState = "aiming"; // aiming, moving
    let p1Type = null, p2Type = null; // 'solids' ou 'stripes'

    class Ball {
        constructor(x, y, radius, color, number, type) {
            this.x = x; this.y = y; this.radius = radius;
            this.color = color; this.number = number;
            this.type = type; // white, solid, stripe, black
            this.velX = 0; this.velY = 0;
            this.inPocket = false;
        }

        draw() {
            if (this.inPocket) return;
            // Sombra e Corpo
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();

            // Faixa se for listrada
            if (this.type === 'stripe') {
                ctx.beginPath();
                ctx.rect(this.x - this.radius, this.y - this.radius/2, this.radius * 2, this.radius);
                ctx.fillStyle = "white";
                ctx.fill();
            }

            // Círculo do número
            if (this.type !== 'white') {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius/2, 0, Math.PI * 2);
                ctx.fillStyle = "white";
                ctx.fill();
                ctx.fillStyle = "black";
                ctx.font = `bold ${this.radius * 0.8}px Arial`;
                ctx.textAlign = "center";
                ctx.fillText(this.number, this.x, this.y + this.radius*0.3);
            }
        }

        update() {
            if (this.inPocket) return;
            this.x += this.velX; this.y += this.velY;
            this.velX *= FRICTION; this.velY *= FRICTION;

            if (Math.abs(this.velX) < 0.1) this.velX = 0;
            if (Math.abs(this.velY) < 0.1) this.velY = 0;

            // Borda
            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                this.velX *= -0.7;
                this.x = this.x < this.radius ? this.radius : canvas.width - this.radius;
            }
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                this.velY *= -0.7;
                this.y = this.y < this.radius ? this.radius : canvas.height - this.radius;
            }
            this.checkPocket();
        }

        checkPocket() {
            const pockets = [
                {x: 0, y: 0}, {x: canvas.width/2, y: 0}, {x: canvas.width, y: 0},
                {x: 0, y: canvas.height}, {x: canvas.width/2, y: canvas.height}, {x: canvas.width, y: canvas.height}
            ];
            pockets.forEach(p => {
                if (Math.hypot(this.x - p.x, this.y - p.y) < ballRadius * 2) {
                    this.inPocket = true;
                    handlePocketed(this);
                }
            });
        }
    }

    function init() {
        const w = window.innerWidth * 0.85;
        canvas.width = w; canvas.height = w / 2;
        ballRadius = canvas.width * BALL_RADIUS_RATIO;
        resetTable();
        requestAnimationFrame(loop);
    }

    function resetTable() {
        balls = [];
        whiteBall = new Ball(canvas.width * 0.25, canvas.height/2, ballRadius, "white", 0, "white");
        balls.push(whiteBall);

        // Rack Oficial (Triângulo)
        const startX = canvas.width * 0.7;
        const startY = canvas.height / 2;
        const colors = ["#f1c40f", "#2980b9", "#e74c3c", "#8e44ad", "#d35400", "#27ae60", "#c0392b", "#333"];
        let count = 1;
        
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j <= i; j++) {
                let type = count <= 7 ? "solid" : (count === 8 ? "black" : "stripe");
                let color = count === 8 ? "black" : colors[(count-1) % 7];
                balls.push(new Ball(
                    startX + (i * ballRadius * 1.75),
                    startY + (j * ballRadius * 2) - (i * ballRadius),
                    ballRadius, color, count, type
                ));
                count++;
            }
        }
    }

    function handlePocketed(ball) {
        if (ball.type === "white") {
            log.innerText = "FALTA! Bola branca encaçapada.";
            setTimeout(() => { 
                ball.inPocket = false; ball.x = canvas.width * 0.25; ball.y = canvas.height/2; 
                ball.velX = 0; ball.velY = 0;
            }, 1000);
        } else if (ball.type === "black") {
            alert(turn === 1 ? "JOABE VENCEU!" : "BOT VENCEU!");
            resetTable();
        } else {
            log.innerText = `Bola ${ball.number} encaçapada!`;
        }
    }

    function resolveCollisions() {
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                let b1 = balls[i], b2 = balls[j];
                if (b1.inPocket || b2.inPocket) continue;
                let dx = b2.x - b1.x, dy = b2.y - b1.y;
                let dist = Math.hypot(dx, dy);
                if (dist < b1.radius + b2.radius) {
                    let angle = Math.atan2(dy, dx);
                    let sin = Math.sin(angle), cos = Math.cos(angle);
                    let vx1 = b1.velX * cos + b1.velY * sin;
                    let vy1 = b1.velY * cos - b1.velX * sin;
                    let vx2 = b2.velX * cos + b2.velY * sin;
                    let vy2 = b2.velY * cos - b2.velX * sin;
                    b1.velX = vx2 * cos - vy1 * sin; b1.velY = vy1 * cos + vx2 * sin;
                    b2.velX = vx1 * cos - vy2 * sin; b2.velY = vy2 * cos + vx1 * sin;
                    let overlap = b1.radius + b2.radius - dist;
                    b1.x -= overlap * cos * 0.5; b1.y -= overlap * sin * 0.5;
                    b2.x += overlap * cos * 0.5; b2.y += overlap * sin * 0.5;
                }
            }
        }
    }

    function loop() {
        ctx.fillStyle = "#07633a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        resolveCollisions();
        let moving = false;
        balls.forEach(b => {
            b.update();
            b.draw();
            if (b.velX !== 0 || b.velY !== 0) moving = true;
        });

        if (!moving && gameState === "moving") {
            gameState = "aiming";
            turn = turn === 1 ? 2 : 1;
            updateUI();
            if (turn === 2) setTimeout(botMove, 1000);
        }

        if (gameState === "aiming" && turn === 1) drawCue();
        requestAnimationFrame(loop);
    }

    function drawCue() {
        const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
        // Mira
        ctx.beginPath(); ctx.setLineDash([5, 5]);
        ctx.moveTo(whiteBall.x, whiteBall.y);
        ctx.lineTo(whiteBall.x + Math.cos(angle) * 500, whiteBall.y + Math.sin(angle) * 500);
        ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke();
        ctx.setLineDash([]);
        // Taco
        const dist = whiteBall.radius + 10 + (power * 0.5);
        ctx.lineWidth = 6; ctx.strokeStyle = "#5d3a1a";
        ctx.beginPath();
        ctx.moveTo(whiteBall.x - Math.cos(angle) * dist, whiteBall.y - Math.sin(angle) * dist);
        ctx.lineTo(whiteBall.x - Math.cos(angle) * (dist + 300), whiteBall.y - Math.sin(angle) * (dist + 300));
        ctx.stroke();
    }

    function updateUI() {
        document.getElementById('p1-box').className = turn === 1 ? "player-info active-turn" : "player-info";
        document.getElementById('p2-box').className = turn === 2 ? "player-info active-turn" : "player-info";
        log.innerText = turn === 1 ? "Sua vez, Joabe!" : "Bot pensando...";
    }

    function botMove() {
        log.innerText = "Bot está mirando...";
        const target = balls.find(b => !b.inPocket && b.type !== "white");
        const angle = Math.atan2(target.y - whiteBall.y, target.x - whiteBall.x);
        const botPower = 15 + Math.random() * 10;
        
        setTimeout(() => {
            whiteBall.velX = Math.cos(angle) * botPower;
            whiteBall.velY = Math.sin(angle) * botPower;
            gameState = "moving";
        }, 1000);
    }

    // Interações
    window.addEventListener('mousemove', e => {
        const r = canvas.getBoundingClientRect();
        mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
    });
    window.addEventListener('mousedown', () => { if(turn === 1 && gameState === "aiming") isCharging = true; });
    window.addEventListener('mouseup', () => {
        if (isCharging) {
            const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
            whiteBall.velX = Math.cos(angle) * (power/5);
            whiteBall.velY = Math.sin(angle) * (power/5);
            isCharging = false; power = 0; powerFill.style.height = '0%';
            gameState = "moving";
        }
    });

    setInterval(() => { if(isCharging) { power = Math.min(power+1.5, 100); powerFill.style.height = power+'%'; } }, 16);

    init();
</script>
</body>
</html>
