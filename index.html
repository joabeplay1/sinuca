<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melody Player PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0b0b0f;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.08);
    --purple: #8b5cf6;
    --gray: #a1a1aa;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: white;
}

.app {
    display: grid;
    grid-template-columns: 240px 1fr 320px;
    height: 100vh;
}

/* SIDEBAR */
.sidebar {
    background: #111114;
    padding: 20px;
    border-right: 1px solid var(--border);
}

.logo { color: var(--purple); margin-bottom: 20px; }

.menu a {
    display:block;
    color: var(--gray);
    padding: 10px;
    text-decoration:none;
    border-radius:8px;
}
.menu a:hover { background: var(--card); color:white; }

/* MAIN */
.main {
    padding:20px;
    overflow-y:auto;
}

.search {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    background:#1a1a1f;
    color:white;
}

.banner {
    margin-top:20px;
    padding:40px;
    border-radius:20px;
    background: linear-gradient(90deg,#6d28d9,#9333ea);
}

.grid {
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:20px;
}

.card {
    background: var(--card);
    border:1px solid var(--border);
    padding:10px;
    border-radius:15px;
    cursor:pointer;
}

.card img {
    width:100%;
    border-radius:10px;
}

.card h4 { margin-top:10px; }

/* RIGHT */
.right {
    background:#111114;
    padding:20px;
    border-left:1px solid var(--border);
}

.cover {
    width:100%;
    aspect-ratio:1;
    background:#222;
    border-radius:15px;
    margin-bottom:10px;
}

audio { width:100%; margin-top:10px; filter:invert(1); }

/* UPLOAD */
.upload input {
    width:100%;
    margin-top:5px;
    padding:8px;
    background:#1a1a1f;
    border:none;
    color:white;
    border-radius:8px;
}

.upload button {
    margin-top:10px;
    width:100%;
    padding:10px;
    background:var(--purple);
    border:none;
    border-radius:10px;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
    <h2 class="logo">🎵 Melody</h2>

    <div class="menu">
        <a href="#">Início</a>
        <a href="#">Explorar</a>
    </div>

    <div class="upload">
        <h4>Postar Música</h4>
        <input type="text" id="titulo" placeholder="Título">
        <input type="file" id="capa">
        <input type="file" id="audio">
        <button onclick="postar()">Publicar</button>
    </div>
</aside>

<!-- MAIN -->
<main class="main">

    <input class="search" placeholder="Buscar músicas...">

    <div class="banner">
        <h1>Novidades da Semana</h1>
    </div>

    <div id="grid" class="grid"></div>

</main>

<!-- RIGHT -->
<aside class="right">

    <div class="cover" id="cover"></div>
    <h3 id="tituloPlayer">Nenhuma música</h3>

    <audio id="player" controls></audio>

</aside>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-storage-compat.js"></script>

<script>

// 🔥 COLOQUE SUA CONFIG AQUI
const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "SEU_APP.firebaseapp.com",
  projectId: "SEU_APP",
  storageBucket: "SEU_APP.appspot.com",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

// 🚀 POSTAR
async function postar() {

    const titulo = document.getElementById("titulo").value;
    const capa = document.getElementById("capa").files[0];
    const audio = document.getElementById("audio").files[0];

    if(!titulo || !capa || !audio){
        alert("Preencha tudo!");
        return;
    }

    const capaRef = storage.ref("capas/" + capa.name);
    await capaRef.put(capa);
    const capaURL = await capaRef.getDownloadURL();

    const audioRef = storage.ref("musicas/" + audio.name);
    await audioRef.put(audio);
    const audioURL = await audioRef.getDownloadURL();

    await db.collection("musicas").add({
        titulo,
        capa: capaURL,
        audio: audioURL
    });

    alert("Música enviada!");
}

// 📥 CARREGAR
const grid = document.getElementById("grid");

db.collection("musicas").onSnapshot(snapshot => {
    grid.innerHTML = "";

    snapshot.forEach(doc => {
        const m = doc.data();

        grid.innerHTML += `
        <div class="card" onclick="tocar('${m.audio}','${m.capa}','${m.titulo}')">
            <img src="${m.capa}">
            <h4>${m.titulo}</h4>
        </div>`;
    });
});

// ▶️ PLAYER
function tocar(audio, capa, titulo){
    document.getElementById("player").src = audio;
    document.getElementById("cover").style.backgroundImage = `url(${capa})`;
    document.getElementById("cover").style.backgroundSize = "cover";
    document.getElementById("tituloPlayer").innerText = titulo;
}

</script>

</body>
</html>
