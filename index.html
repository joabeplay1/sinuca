<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>CinePlay 8 Ball | REGRAS OFICIAIS</title>
    <style>
        :root {
            --gold: #c5a059;
            --felt: #074a2e;
            --wood: #2a1b0d;
            --accent: #00ff88;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background: radial-gradient(circle at center, #1a1f1c 0%, #050505 100%);
            font-family: 'Segoe UI', Roboto, sans-serif;
            color: white;
        }

        #app-wrapper {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; width: 100vw;
        }

        header {
            width: 95%; display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 26px; font-weight: bold; letter-spacing: 4px; }
        .logo span { display: block; font-size: 10px; color: var(--gold); letter-spacing: 2px; }

        #game-hud {
            display: flex; gap: 30px; background: var(--glass); padding: 12px 40px;
            border-radius: 50px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .active-p { color: var(--accent); text-shadow: 0 0 15px var(--accent); font-weight: 900; }

        #table-frame {
            position: relative; padding: 20px;
            background: linear-gradient(145deg, #3d2b1f, #1a110a);
            border-radius: 15px;
            box-shadow: 0 40px 100px #000, inset 0 0 60px #000;
            border: 2px solid #2c1e14;
        }

        canvas { 
            background-color: var(--felt); 
            display: block; border-radius: 5px; 
            cursor: crosshair;
        }

        #power-ui {
            position: absolute; right: -35px; top: 50%; transform: translateY(-50%);
            height: 300px; width: 12px; background: #000; border-radius: 20px;
            border: 1px solid #444; overflow: hidden;
        }
        #power-fill { position: absolute; bottom: 0; width: 100%; height: 0%; background: linear-gradient(to top, var(--accent), #ffeb3b, #f00); }

        #msg-log { 
            position: absolute; bottom: -45px; width: 100%; text-align: center;
            font-size: 14px; color: var(--gold); font-weight: bold;
        }
    </style>
</head>
<body>

<div id="app-wrapper">
    <header>
        <div class="logo">CINEPLAY <span>ULTRA HD 4K • REGRAS OFICIAIS</span></div>
        <div id="game-hud">
            <div id="p1-card" class="active-p">JOABE PLAY <div id="p1-group" style="font-size:9px">GRUPO: ?</div></div>
            <div style="font-weight:900; color:#444">VS</div>
            <div id="p2-card">BOT MASTER <div id="p2-group" style="font-size:9px"></div></div>
        </div>
        <button onclick="location.reload()" style="background:var(--accent); border:none; padding:8px 15px; border-radius:10px; font-weight:bold; cursor:pointer">RESET</button>
    </header>

    <div id="main-content" style="position:relative; margin-top:20px;">
        <div id="table-frame">
            <div id="power-ui"><div id="power-fill"></div></div>
            <canvas id="poolCanvas"></canvas>
        </div>
        <div id="msg-log">ACERTE UMA BOLA PARA DEFINIR SEU GRUPO</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('poolCanvas');
    const ctx = canvas.getContext('2d');
    const powerBar = document.getElementById('power-fill');
    const log = document.getElementById('msg-log');

    // --- ENGINE 4K ULTRA HD ---
    const dpr = window.devicePixelRatio || 2;
    const baseWidth = Math.min(window.innerWidth * 0.92, 1200); 
    const baseHeight = baseWidth / 2;

    canvas.width = baseWidth * dpr; canvas.height = baseHeight * dpr;
    canvas.style.width = baseWidth + 'px'; canvas.style.height = baseHeight + 'px';
    ctx.scale(dpr, dpr);

    // --- LÓGICA DE JOGO ---
    let ballRadius = baseWidth * 0.022;
    let balls = [], whiteBall, pockets = [];
    let turn = 1, p1Group = null, isMoving = false, isCharging = false, power = 0;
    let ballInHand = false, firstBallTouched = null, mouseX = 0, mouseY = 0;

    class Ball {
        constructor(x, y, radius, color, num, type) {
            this.x = x; this.y = y; this.radius = radius;
            this.color = color; this.num = num; this.type = type;
            this.vx = 0; this.vy = 0; this.inPocket = false;
        }

        draw() {
            if (this.inPocket) return;
            ctx.save();
            ctx.shadowColor = "rgba(0,0,0,0.5)"; ctx.shadowBlur = 15;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.color; ctx.fill();
            ctx.shadowBlur = 0;

            if (this.type === 'stripe') {
                ctx.beginPath(); ctx.ellipse(this.x, this.y, this.radius, this.radius*0.55, 0, 0, Math.PI*2);
                ctx.fillStyle = "white"; ctx.fill();
            }

            if (this.type !== 'white') {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius*0.52, 0, Math.PI*2);
                ctx.fillStyle = "white"; ctx.fill();
                ctx.fillStyle = "black"; ctx.font = `bold ${this.radius*0.8}px Arial`;
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(this.num, this.x, this.y);
            }

            let shine = ctx.createRadialGradient(this.x-this.radius*0.4, this.y-this.radius*0.4, 2, this.x, this.y, this.radius);
            shine.addColorStop(0, "rgba(255,255,255,0.4)"); shine.addColorStop(1, "rgba(0,0,0,0.2)");
            ctx.fillStyle = shine; ctx.fill();
            ctx.restore();
        }

        update() {
            if (this.inPocket) return;
            this.x += this.vx; this.y += this.vy;
            this.vx *= 0.988; this.vy *= 0.988;

            if (this.x + this.radius > baseWidth || this.x - this.radius < 0) {
                this.vx *= -0.7; this.x = this.x < this.radius ? this.radius : baseWidth - this.radius;
            }
            if (this.y + this.radius > baseHeight || this.y - this.radius < 0) {
                this.vy *= -0.7; this.y = this.y < this.radius ? this.radius : baseHeight - this.radius;
            }
            this.checkPocket();
        }

        checkPocket() {
            pockets.forEach(p => {
                const dist = Math.hypot(this.x - p.x, this.y - p.y);
                if (dist < ballRadius * 2.2) { this.vx += (p.x - this.x) * 0.15; this.vy += (p.y - this.y) * 0.15; }
                if (dist < ballRadius * 1.5) {
                    this.inPocket = true; this.vx = 0; this.vy = 0;
                    handleRules(this);
                }
            });
        }
    }

    function setupRack() {
        balls = [];
        whiteBall = new Ball(baseWidth*0.25, baseHeight/2, ballRadius, "#fff", 0, "white");
        balls.push(whiteBall);
        const colors = ["#f1c40f", "#2980b9", "#e74c3c", "#8e44ad", "#d35400", "#27ae60", "#c0392b", "#000"];
        let count = 1;
        const startX = baseWidth * 0.7, startY = baseHeight/2;
        for (let i = 0; i < 5; i++) {
            for (let j = 0; j <= i; j++) {
                let type = (count === 8) ? "black" : (count <= 7 ? "solid" : "stripe");
                let color = (count === 8) ? "#000" : colors[(count-1) % 7];
                balls.push(new Ball(startX + (i*ballRadius*1.78), startY + (j*ballRadius*2.05) - (i*ballRadius), ballRadius, color, count, type));
                count++;
            }
        }
    }

    function handleRules(ball) {
        if (ball.type === "white") {
            ballInHand = true;
            log.innerText = "FALTA! BOLA NA MÃO.";
            setTimeout(() => { ball.inPocket = false; ball.vx = 0; ball.vy = 0; }, 500);
        } else if (ball.type === "black") {
            const myBalls = balls.filter(b => !b.inPocket && b.type === (turn === 1 ? p1Group : (p1Group === 'solid' ? 'stripe' : 'solid'))).length;
            if (myBalls > 0) alert("DERROTA! Encaçapou a 8 antes da hora.");
            else alert(turn === 1 ? "JOABE PLAY VENCEU! 🏆" : "BOT VENCEU!");
            location.reload();
        } else if (!p1Group) {
            p1Group = (turn === 1) ? ball.type : (ball.type === 'solid' ? 'stripe' : 'solid');
            document.getElementById('p1-group').innerText = "GRUPO: " + (p1Group === 'solid' ? 'LISAS' : 'LISTRADAS');
            document.getElementById('p2-group').innerText = "GRUPO: " + (p1Group === 'solid' ? 'LISTRADAS' : 'LISAS');
        }
    }

    function gameLoop() {
        ctx.fillStyle = "#074a2e"; ctx.fillRect(0, 0, baseWidth, baseHeight);
        ctx.fillStyle = "#000"; pockets.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, ballRadius*2.4, 0, Math.PI*2); ctx.fill(); });

        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                let b1 = balls[i], b2 = balls[j];
                if (b1.inPocket || b2.inPocket) continue;
                let dx = b2.x - b1.x, dy = b2.y - b1.y;
                let dist = Math.hypot(dx, dy);
                if (dist < b1.radius + b2.radius) {
                    if (b1 === whiteBall && !firstBallTouched) firstBallTouched = b2;
                    let angle = Math.atan2(dy, dx);
                    let vx1 = b1.vx * Math.cos(angle) + b1.vy * Math.sin(angle);
                    let vy1 = b1.vy * Math.cos(angle) - b1.vx * Math.sin(angle);
                    let vx2 = b2.vx * Math.cos(angle) + b2.vy * Math.sin(angle);
                    let vy2 = b2.vy * Math.cos(angle) - b2.vx * Math.sin(angle);
                    b1.vx = vx2 * Math.cos(angle) - vy1 * Math.sin(angle); b1.vy = vy1 * Math.cos(angle) + vx2 * Math.sin(angle);
                    b2.vx = vx1 * Math.cos(angle) - vy2 * Math.sin(angle); b2.vy = vy2 * Math.cos(angle) + vx1 * Math.sin(angle);
                    let overlap = (b1.radius + b2.radius - dist) / 2;
                    b1.x -= overlap * Math.cos(angle); b1.y -= overlap * Math.sin(angle);
                    b2.x += overlap * Math.cos(angle); b2.y += overlap * Math.sin(angle);
                }
            }
        }

        let moving = false;
        balls.forEach(b => { b.update(); b.draw(); if (Math.abs(b.vx) > 0.1 || Math.abs(b.vy) > 0.1) moving = true; });

        if (!moving && isMoving) {
            isMoving = false;
            const currentPlayerGroup = (turn === 1) ? p1Group : (p1Group === 'solid' ? 'stripe' : 'solid');
            // Verifica Falta: Não tocar em nada OU tocar na bola errada primeiro
            if (!firstBallTouched || (currentPlayerGroup && firstBallTouched.type !== currentPlayerGroup)) {
                ballInHand = true;
                log.innerText = "FALTA! TOQUE ILEGAL. BOLA NA MÃO.";
            }
            firstBallTouched = null;
            turn = turn === 1 ? 2 : 1;
            updateHUD();
            if (turn === 2) setTimeout(botDecision, 1200);
        }

        if (!moving && turn === 1 && !ballInHand) drawCue();
        if (ballInHand && turn === 1) { 
            whiteBall.x = mouseX; whiteBall.y = mouseY;
            ctx.fillStyle = "rgba(0,255,136,0.1)"; ctx.fillRect(0,0,baseWidth,baseHeight);
        }
        requestAnimationFrame(gameLoop);
    }

    function drawCue() {
        const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
        ctx.beginPath(); ctx.setLineDash([8, 8]); ctx.moveTo(whiteBall.x, whiteBall.y);
        ctx.lineTo(whiteBall.x + Math.cos(angle) * 700, whiteBall.y + Math.sin(angle) * 700);
        ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.lineWidth = 2; ctx.stroke(); ctx.setLineDash([]);
        const offset = whiteBall.radius + 15 + (power * 0.8);
        ctx.save(); ctx.translate(whiteBall.x, whiteBall.y); ctx.rotate(angle + Math.PI);
        let cueGrad = ctx.createLinearGradient(offset, 0, offset+450, 0);
        cueGrad.addColorStop(0, var(--gold)); cueGrad.addColorStop(1, "#3e2a10");
        ctx.fillStyle = cueGrad; ctx.fillRect(offset, -7, 450, 14); ctx.restore();
    }

    function updateHUD() {
        document.getElementById('p1-card').className = (turn === 1) ? 'active-p' : '';
        document.getElementById('p2-card').className = (turn === 2) ? 'active-p' : '';
        if (!ballInHand) log.innerText = turn === 1 ? "SUA VEZ, JOABE!" : "BOT MASTER PENSANDO...";
    }

    function botDecision() {
        if (ballInHand) { whiteBall.x = baseWidth*0.25; whiteBall.y = baseHeight/2; ballInHand = false; }
        const targets = balls.filter(b => !b.inPocket && b.type !== 'white');
        const target = targets[Math.floor(Math.random() * targets.length)];
        const angle = Math.atan2(target.y - whiteBall.y, target.x - whiteBall.x);
        whiteBall.vx = Math.cos(angle) * 16; whiteBall.vy = Math.sin(angle) * 16; isMoving = true;
    }

    window.addEventListener('mousemove', e => { 
        const r = canvas.getBoundingClientRect(); 
        mouseX = e.clientX - r.left; mouseY = e.clientY - r.top; 
    });
    window.addEventListener('mousedown', () => { 
        if(ballInHand && turn === 1) { ballInHand = false; log.innerText = "BOLA POSICIONADA!"; }
        else if(!isMoving && turn === 1) isCharging = true; 
    });
    window.addEventListener('mouseup', () => { 
        if (isCharging) { 
            const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
            whiteBall.vx = Math.cos(angle) * (power/4.5); whiteBall.vy = Math.sin(angle) * (power/4.5);
            isCharging = false; power = 0; document.getElementById('power-fill').style.height = "0%"; isMoving = true;
        }
    });

    setInterval(() => { if(isCharging) { power = Math.min(power+2.5, 100); document.getElementById('power-fill').style.height = power+"%"; } }, 16);

    pockets = [{x:0,y:0},{x:baseWidth/2,y:0},{x:baseWidth,y:0},{x:0,y:baseHeight},{x:baseWidth/2,y:baseHeight},{x:baseWidth,y:baseHeight}];
    setupRack();
    gameLoop();
</script>
</body>
</html>
