<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinePlay 8-Ball Pro | Joabe Play</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #121212; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        #game-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
        }

        /* HUD Profissional */
        #hud {
            width: 80%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 15px 30px;
            border-radius: 15px;
            border-bottom: 3px solid #00ff88;
        }

        .player-box { text-align: center; }
        .turn-indicator { color: #00ff88; font-weight: bold; font-size: 1.2em; text-transform: uppercase; }

        canvas {
            box-shadow: 0 0 100px rgba(0,0,0,0.9);
            border: 15px solid #2c1e14;
            border-radius: 8px;
            background: #07633a;
        }

        #power-meter {
            position: absolute;
            right: 40px;
            height: 300px;
            width: 25px;
            background: #222;
            border: 2px solid #444;
            border-radius: 10px;
            overflow: hidden;
        }

        #power-level {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, #00ff88, #ffeb3b, #ff5722);
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="hud">
        <div class="player-box">
            <div id="status">VEZ DE: <span class="turn-indicator">JOABE PLAY</span></div>
        </div>
        <div class="player-box">
            <div>🎱 BOLA 8 DECISIVA</div>
        </div>
    </div>

    <div id="power-meter">
        <div id="power-level"></div>
    </div>

    <canvas id="poolCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('poolCanvas');
    const ctx = canvas.getContext('2d');
    const powerLevel = document.getElementById('power-level');

    // --- CONFIGURAÇÕES FÍSICAS ---
    const FRICTION = 0.988; // Atrito da mesa
    const WALL_BOUNCE = 0.7; // Rebote nas bordas
    const BALL_BOUNCE = 0.9; // Colisão entre bolas
    let ballRadius;
    
    // --- ESTADO DO JOGO ---
    let balls = [];
    let whiteBall;
    let isCharging = false;
    let power = 0;
    let mouseX, mouseY;

    class Ball {
        constructor(x, y, radius, color, number) {
            this.x = x; this.y = y;
            this.radius = radius;
            this.color = color;
            this.number = number;
            this.velX = 0; this.velY = 0;
            this.inPocket = false;
        }

        draw() {
            if (this.inPocket) return;

            // Sombra projetada
            ctx.beginPath();
            ctx.arc(this.x + 4, this.y + 4, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(0,0,0,0.25)";
            ctx.fill();

            // Corpo da bola
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();

            // Detalhe de luz (3D)
            ctx.beginPath();
            ctx.arc(this.x - this.radius/2.5, this.y - this.radius/2.5, this.radius/3, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            ctx.fill();
        }

        update() {
            if (this.inPocket) return;

            this.x += this.velX;
            this.y += this.velY;
            this.velX *= FRICTION;
            this.velY *= FRICTION;

            // Parada total
            if (Math.abs(this.velX) < 0.05) this.velX = 0;
            if (Math.abs(this.velY) < 0.05) this.velY = 0;

            // Colisão com bordas
            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                this.velX *= -WALL_BOUNCE;
                this.x = this.x < this.radius ? this.radius : canvas.width - this.radius;
            }
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                this.velY *= -WALL_BOUNCE;
                this.y = this.y < this.radius ? this.radius : canvas.height - this.radius;
            }

            // Verificar se caiu na caçapa
            checkPocket(this);
        }
    }

    function init() {
        // Redimensionamento Profissional 2:1
        const w = window.innerWidth * 0.85;
        canvas.width = w;
        canvas.height = w / 2;
        ballRadius = canvas.width * 0.016;

        balls = [];
        // Bola Branca
        whiteBall = new Ball(canvas.width * 0.25, canvas.height / 2, ballRadius, '#fff', 0);
        balls.push(whiteBall);

        // Criar triângulo de bolas (Exemplo simples de 3 bolas para teste)
        createRack(canvas.width * 0.7, canvas.height / 2);
    }

    function createRack(startX, startY) {
        const colors = ['#f1c40f', '#2980b9', '#e74c3c', '#8e44ad', '#d35400', '#27ae60', '#c0392b', '#2c3e50'];
        let count = 0;
        for (let i = 0; i < 3; i++) {
            for (let j = 0; j <= i; j++) {
                balls.push(new Ball(
                    startX + (i * ballRadius * 1.8),
                    startY + (j * ballRadius * 2.1) - (i * ballRadius),
                    ballRadius,
                    colors[count % colors.length],
                    count + 1
                ));
                count++;
            }
        }
    }

    function checkPocket(ball) {
        const pockets = [
            {x: 0, y: 0}, {x: canvas.width/2, y: 0}, {x: canvas.width, y: 0},
            {x: 0, y: canvas.height}, {x: canvas.width/2, y: canvas.height}, {x: canvas.width, y: canvas.height}
        ];
        pockets.forEach(p => {
            const dist = Math.hypot(ball.x - p.x, ball.y - p.y);
            if (dist < ballRadius * 2.5) {
                ball.inPocket = true;
                ball.velX = 0; ball.velY = 0;
                if (ball === whiteBall) {
                    setTimeout(() => { // Reposiciona branca se cair
                        ball.inPocket = false;
                        ball.x = canvas.width * 0.25;
                        ball.y = canvas.height / 2;
                    }, 500);
                }
            }
        });
    }

    // --- FÍSICA DE COLISÃO ENTRE BOLAS ---
    function resolveCollision(b1, b2) {
        const dx = b2.x - b1.x;
        const dy = b2.y - b1.y;
        const distance = Math.hypot(dx, dy);

        if (distance < b1.radius + b2.radius) {
            // Ângulo de colisão
            const angle = Math.atan2(dy, dx);
            const sin = Math.sin(angle);
            const cos = Math.cos(angle);

            // Rotação de velocidades
            const vx1 = b1.velX * cos + b1.velY * sin;
            const vy1 = b1.velY * cos - b1.velX * sin;
            const vx2 = b2.velX * cos + b2.velY * sin;
            const vy2 = b2.velY * cos - b2.velX * sin;

            // Troca de velocidades (elástica)
            const vxTotal = vx1 - vx2;
            const resVx1 = vx2;
            const resVx2 = vx1;

            // Volta as velocidades para o plano normal
            b1.velX = resVx1 * cos - vy1 * sin;
            b1.velY = vy1 * cos + resVx1 * sin;
            b2.velX = resVx2 * cos - vy2 * sin;
            b2.velY = vy2 * cos + resVx2 * sin;

            // Evitar que as bolas grudem (correção de sobreposição)
            const overlap = (b1.radius + b2.radius - distance) / 2;
            b1.x -= overlap * cos;
            b1.y -= overlap * sin;
            b2.x += overlap * cos;
            b2.y += overlap * sin;
        }
    }

    function drawCue() {
        if (balls.some(b => b.velX !== 0 || b.velY !== 0)) return;

        const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
        
        // Linha de Mira
        ctx.beginPath();
        ctx.setLineDash([6, 6]);
        ctx.moveTo(whiteBall.x, whiteBall.y);
        ctx.lineTo(whiteBall.x + Math.cos(angle) * 600, whiteBall.y + Math.sin(angle) * 600);
        ctx.strokeStyle = "rgba(255,255,255,0.2)";
        ctx.stroke();
        ctx.setLineDash([]);

        // Taco
        const offset = whiteBall.radius + 15 + (power * 0.6);
        ctx.lineWidth = ballRadius * 0.4;
        ctx.lineCap = "round";
        const grad = ctx.createLinearGradient(
            whiteBall.x - Math.cos(angle) * offset, 
            whiteBall.y - Math.sin(angle) * offset,
            whiteBall.x - Math.cos(angle) * (offset + 400),
            whiteBall.y - Math.sin(angle) * (offset + 400)
        );
        grad.addColorStop(0, '#ddc485'); grad.addColorStop(1, '#3d2b1f');
        ctx.strokeStyle = grad;
        ctx.beginPath();
        ctx.moveTo(whiteBall.x - Math.cos(angle) * offset, whiteBall.y - Math.sin(angle) * offset);
        ctx.lineTo(whiteBall.x - Math.cos(angle) * (offset + 400), whiteBall.y - Math.sin(angle) * (offset + 400));
        ctx.stroke();
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Colisões entre todas as bolas
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                if (!balls[i].inPocket && !balls[j].inPocket) {
                    resolveCollision(balls[i], balls[j]);
                }
            }
        }

        balls.forEach(b => {
            b.update();
            b.draw();
        });

        drawCue();

        if (isCharging) {
            power = Math.min(power + 1.2, 100);
            powerLevel.style.height = power + '%';
        }
    }

    // Listeners
    window.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
    });

    window.addEventListener('mousedown', () => isCharging = true);
    window.addEventListener('mouseup', () => {
        if (isCharging) {
            const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
            whiteBall.velX = Math.cos(angle) * (power / 4);
            whiteBall.velY = Math.sin(angle) * (power / 4);
            isCharging = false;
            power = 0;
            powerLevel.style.height = '0%';
        }
    });

    init();
    setInterval(update, 1000/60);
</script>
</body>
</html>
