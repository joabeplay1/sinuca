<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>SINUCA PRO | CinePlay</title>
    <style>
        :root {
            --gold: #c5a059;
            --green-felt: #07633a;
            --dark-bg: #0a0c0b;
            --glass: rgba(255, 255, 255, 0.05);
            --accent: #00ff88;
        }

        body, html { 
            margin: 0; padding: 0; overflow: hidden; 
            background-color: var(--dark-bg);
            font-family: 'Playfair Display', serif, Arial; 
            color: white;
        }

        /* Fundo com degradê cinematográfico */
        #app-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(circle at center, #1a1f1c 0%, #050505 100%);
        }

        /* Navbar Superior Estilo Imagem */
        header {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { font-size: 24px; font-weight: bold; letter-spacing: 4px; color: white; }
        .logo span { display: block; font-size: 10px; letter-spacing: 2px; color: var(--gold); }

        nav a { color: rgba(255,255,255,0.7); text-decoration: none; margin: 0 15px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        nav a.active { color: white; border-bottom: 2px solid var(--accent); padding-bottom: 5px; }

        /* Container Central da Mesa */
        #main-content {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-top: 20px;
        }

        #table-frame {
            position: relative;
            padding: 25px;
            background: linear-gradient(145deg, #3d2b1f, #1a110a);
            border-radius: 15px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8), inset 0 0 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.05);
        }

        canvas {
            background-color: var(--green-felt);
            display: block;
            border-radius: 5px;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.6);
            cursor: crosshair;
        }

        /* Menu Lateral Estilo Glassmorphism */
        .side-menu {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            width: 80px;
            transition: 0.3s;
            cursor: pointer;
        }
        .menu-item:hover { background: rgba(255,255,255,0.1); transform: translateX(5px); }
        .menu-item img { width: 30px; margin-bottom: 10px; opacity: 0.8; }
        .menu-item span { display: block; font-size: 10px; text-transform: uppercase; color: #aaa; }

        /* Barra de Força Profissional */
        #power-container {
            position: absolute;
            right: -30px;
            top: 50%;
            transform: translateY(-50%);
            height: 300px;
            width: 10px;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #power-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 0%;
            background: linear-gradient(to top, var(--accent), #ffeb3b, #f44336);
            transition: height 0.1s;
        }

        /* Estatísticas Inferiores */
        .stats-row {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            width: 90%;
        }

        .stat-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 15px;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-card h4 { margin: 0; font-size: 18px; color: white; }
        .stat-card p { margin: 0; font-size: 11px; color: #888; }

    </style>
</head>
<body>

<div id="app-wrapper">
    <header>
        <div class="logo">SINUCA <span>FOCO • PRECISÃO • ESTRATÉGIA</span></div>
        <nav>
            <a href="#" class="active">Início</a>
            <a href="#">Jogar</a>
            <a href="#">Ranking</a>
            <a href="#">Torneios</a>
            <a href="#">Aprender</a>
        </nav>
        <div style="display:flex; align-items:center; gap:10px;">
            <div style="text-align:right"><div style="font-size:12px">Olá, Joabe Play</div><div style="font-size:10px; color:var(--gold)">Nível 12</div></div>
            <img src="https://via.placeholder.com/40" style="border-radius:50%; border:2px solid var(--accent)">
        </div>
    </header>

    <div id="main-content">
        <div id="table-frame">
            <div id="power-container"><div id="power-bar"></div></div>
            <canvas id="poolCanvas"></canvas>
        </div>

        <div class="side-menu">
            <div class="menu-item"><span>Solo</span><strong>TREINO</strong></div>
            <div class="menu-item"><span>PvP</span><strong>ONLINE</strong></div>
            <div class="menu-item"><span>Global</span><strong>RANKING</strong></div>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div style="font-size:24px">👥</div>
            <div><h4>1.254</h4><p>Jogadores online</p></div>
        </div>
        <div class="stat-card">
            <div style="font-size:24px">🏆</div>
            <div><h4>32</h4><p>Torneios ativos</p></div>
        </div>
        <div class="stat-card">
            <div style="font-size:24px">📈</div>
            <div><h4>8.732</h4><p>Partidas hoje</p></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('poolCanvas');
    const ctx = canvas.getContext('2d');
    const powerBar = document.getElementById('power-bar');

    // MANTENDO TODA A LÓGICA QUE JÁ FOI FEITA
    let ballRadius, whiteBall, balls = [], pockets = [];
    const FRICTION = 0.988;
    const WALL_BOUNCE = 0.75;
    let turn = 1, isMoving = false, isCharging = false, power = 0, mouseX, mouseY;

    class Ball {
        constructor(x, y, radius, color, num, type) {
            this.x = x; this.y = y; this.radius = radius;
            this.color = color; this.num = num; this.type = type;
            this.vx = 0; this.vy = 0; this.inPocket = false;
        }

        draw() {
            if (this.inPocket) return;
            
            // Sombra realista
            ctx.beginPath();
            ctx.arc(this.x + 4, this.y + 4, this.radius, 0, Math.PI*2);
            ctx.fillStyle = "rgba(0,0,0,0.3)"; ctx.fill();

            // Corpo da Bola com brilho premium
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
            ctx.fillStyle = this.color; ctx.fill();

            if (this.type === 'stripe') {
                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.55, 0, 0, Math.PI * 2);
                ctx.fillStyle = "#fff"; ctx.fill();
            }

            if (this.type !== 'white') {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.52, 0, Math.PI*2);
                ctx.fillStyle = "#fff"; ctx.fill();
                ctx.fillStyle = "#000"; ctx.font = `bold ${this.radius * 0.8}px Arial`;
                ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(this.num, this.x, this.y);
            }

            let shine = ctx.createRadialGradient(this.x-5, this.y-5, 1, this.x, this.y, this.radius);
            shine.addColorStop(0, "rgba(255,255,255,0.4)");
            shine.addColorStop(1, "rgba(0,0,0,0.2)");
            ctx.fillStyle = shine; ctx.fill();
        }

        update() {
            if (this.inPocket) return;
            this.x += this.vx; this.y += this.vy;
            this.vx *= FRICTION; this.vy *= FRICTION;
            if (Math.abs(this.vx) < 0.08) this.vx = 0;
            if (Math.abs(this.vy) < 0.08) this.vy = 0;

            if (this.x + this.radius > canvas.width || this.x - this.radius < 0) {
                this.vx *= -WALL_BOUNCE;
                this.x = this.x < this.radius ? this.radius : canvas.width - this.radius;
            }
            if (this.y + this.radius > canvas.height || this.y - this.radius < 0) {
                this.vy *= -WALL_BOUNCE;
                this.y = this.y < this.radius ? this.radius : canvas.height - this.radius;
            }
            this.checkPocket();
        }

        checkPocket() {
            pockets.forEach(p => {
                if (Math.hypot(this.x - p.x, this.y - p.y) < ballRadius * 1.9) {
                    this.inPocket = true; this.vx = 0; this.vy = 0;
                }
            });
        }
    }

    function init() {
        const w = Math.min(window.innerWidth * 0.75, 900);
        canvas.width = w; canvas.height = w / 2;
        ballRadius = canvas.width * 0.021;

        pockets = [
            {x: 0, y: 0}, {x: canvas.width/2, y: -5}, {x: canvas.width, y: 0},
            {x: 0, y: canvas.height}, {x: canvas.width/2, y: canvas.height+5}, {x: canvas.width, y: canvas.height}
        ];

        setupRack();
        requestAnimationFrame(gameLoop);
    }

    function setupRack() {
        balls = [];
        whiteBall = new Ball(canvas.width * 0.25, canvas.height/2, ballRadius, "#fff", 0, "white");
        balls.push(whiteBall);

        const colors = ["#f1c40f", "#2980b9", "#e74c3c", "#8e44ad", "#d35400", "#27ae60", "#c0392b", "#000"];
        let count = 1;
        const startX = canvas.width * 0.68, startY = canvas.height/2;

        for (let i = 0; i < 5; i++) {
            for (let j = 0; j <= i; j++) {
                let type = (count === 8) ? "black" : (count <= 7 ? "solid" : "stripe");
                let color = (count === 8) ? "#000" : colors[(count-1) % 7];
                balls.push(new Ball(startX + (i*ballRadius*1.78), startY + (j*ballRadius*2.05) - (i*ballRadius), ballRadius, color, count, type));
                count++;
            }
        }
    }

    function gameLoop() {
        ctx.fillStyle = "#07633a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#000";
        pockets.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, ballRadius*2.4, 0, Math.PI*2); ctx.fill(); });

        // Física básica de colisão
        for (let i = 0; i < balls.length; i++) {
            for (let j = i + 1; j < balls.length; j++) {
                let b1 = balls[i], b2 = balls[j];
                if (b1.inPocket || b2.inPocket) continue;
                let dx = b2.x - b1.x, dy = b2.y - b1.y;
                let dist = Math.hypot(dx, dy);
                if (dist < b1.radius + b2.radius) {
                    let angle = Math.atan2(dy, dx);
                    let vx1 = b1.vx * Math.cos(angle) + b1.vy * Math.sin(angle);
                    let vy1 = b1.vy * Math.cos(angle) - b1.vx * Math.sin(angle);
                    let vx2 = b2.vx * Math.cos(angle) + b2.vy * Math.sin(angle);
                    let vy2 = b2.vy * Math.cos(angle) - b2.vx * Math.sin(angle);
                    b1.vx = vx2 * Math.cos(angle) - vy1 * Math.sin(angle);
                    b1.vy = vy1 * Math.cos(angle) + vx2 * Math.sin(angle);
                    b2.vx = vx1 * Math.cos(angle) - vy2 * Math.sin(angle);
                    b2.vy = vy2 * Math.cos(angle) + vx1 * Math.sin(angle);
                    let overlap = b1.radius + b2.radius - dist;
                    b1.x -= overlap * Math.cos(angle) * 0.5; b1.y -= overlap * Math.sin(angle) * 0.5;
                    b2.x += overlap * Math.cos(angle) * 0.5; b2.y += overlap * Math.sin(angle) * 0.5;
                }
            }
        }

        let moving = false;
        balls.forEach(b => {
            b.update(); b.draw();
            if (b.vx !== 0 || b.vy !== 0) moving = true;
        });

        if (!moving && isMoving) {
            isMoving = false; turn = turn === 1 ? 2 : 1;
        }

        if (!moving && turn === 1) drawCue();
        requestAnimationFrame(gameLoop);
    }

    function drawCue() {
        const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
        ctx.beginPath(); ctx.setLineDash([6, 6]);
        ctx.moveTo(whiteBall.x, whiteBall.y);
        ctx.lineTo(whiteBall.x + Math.cos(angle) * 700, whiteBall.y + Math.sin(angle) * 700);
        ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.stroke(); ctx.setLineDash([]);

        const offset = whiteBall.radius + 15 + (power * 0.7);
        ctx.save();
        ctx.translate(whiteBall.x, whiteBall.y); ctx.rotate(angle + Math.PI);
        let grad = ctx.createLinearGradient(offset, 0, offset+450, 0);
        grad.addColorStop(0, "#f1c40f"); grad.addColorStop(1, "#3e2a10");
        ctx.fillStyle = grad; ctx.fillRect(offset, -6, 450, 12);
        ctx.restore();
    }

    window.addEventListener('mousemove', e => {
        const r = canvas.getBoundingClientRect();
        mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
    });
    window.addEventListener('mousedown', () => { if(!isMoving && turn === 1) isCharging = true; });
    window.addEventListener('mouseup', () => {
        if (isCharging) {
            const angle = Math.atan2(mouseY - whiteBall.y, mouseX - whiteBall.x);
            whiteBall.vx = Math.cos(angle) * (power/4.5);
            whiteBall.vy = Math.sin(angle) * (power/4.5);
            isCharging = false; power = 0; powerBar.style.height = "0%"; isMoving = true;
        }
    });

    setInterval(() => { if(isCharging) { power = Math.min(power+2.2, 100); powerBar.style.height = power+"%"; } }, 16);
    init();
</script>
</body>
</html>
