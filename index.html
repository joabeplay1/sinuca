<div class="upload">
    <h4>Postar Música</h4>

    <input type="text" id="titulo" placeholder="Título">

    <!-- INPUTS ESCONDIDOS -->
    <input type="file" id="capa" accept="image/*" hidden>
    <input type="file" id="audio" accept="audio/*" hidden>

    <!-- BOTÕES BONITOS -->
    <button onclick="selecionarCapa()">📸 Adicionar Capa</button>
    <button onclick="selecionarAudio()">🎵 Adicionar Música</button>

    <button onclick="postar()">🚀 Publicar</button>
</div>
